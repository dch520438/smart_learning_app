name: smart_learning_app
description: 智慧学习软件 - 全平台学习助手
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 本地数据库
  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.3.0
  sqlite3: ^2.4.0
  path_provider: ^2.1.1

  # 媒体相关
  image_picker: ^1.0.4
  camera: ^0.10.5+5

  # 语音相关
  speech_to_text: ^7.0.0
  flutter_tts: ^3.8.5

  # AI/ML 相关 - 只使用文字识别，避免 smart_reply 问题
  google_mlkit_text_recognition: ^0.14.0

  # 状态管理
  provider: ^6.1.1

  # 文件与分享
  file_picker: ^8.0.0
  share_plus: ^7.2.1

  # 打印与PDF
  printing: ^5.11.1
  pdf: ^3.10.7

  # 渲染相关
  flutter_markdown: ^0.6.18
  flutter_html: ^3.0.0-beta.2
  photo_view: ^0.14.0

  # 图表与可视化
  graphview: ^1.2.0
  fl_chart: ^0.65.0

  # 工具类
  intl: ^0.18.1
  uuid: ^4.2.1
  shared_preferences: ^2.2.2
  http: ^1.1.2

  # UI 辅助
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  fonts:
    # 文泉驿微米黑 - 备用中文字体
    - family: WQYMicroHei
      fonts:
        - asset: fonts/WenQuanYiMicroHei.ttf
          weight: 400
        - asset: fonts/WenQuanYiMicroHei.ttf
          weight: 600
          style: normal
    # Noto Sans CJK - 主要中文字体
    - family: NotoSansCJK
      fonts:
        - asset: fonts/NotoSansCJK-Regular.ttc
          weight: 400
        - asset: fonts/NotoSansCJK-Regular.ttc
          weight: 500
        - asset: fonts/NotoSansCJK-Regular.ttc
          weight: 600
