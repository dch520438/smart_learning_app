name: Build All Platforms

on:
  workflow_dispatch:
    inputs:
      build_android:
        description: '构建 Android APK'
        required: false
        default: true
        type: boolean
      build_windows:
        description: '构建 Windows'
        required: false
        default: true
        type: boolean
      build_linux:
        description: '构建 Linux'
        required: false
        default: true
        type: boolean

jobs:
  build_android:
    name: Android APK
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.build_android == 'true' || github.event.inputs.build_android == '' }}
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
    - run: flutter pub get
    - run: flutter build apk --release
    - uses: actions/upload-artifact@v4
      with:
        name: android-apk
        path: build/app/outputs/flutter-apk/app-release.apk

  build_windows:
    name: Windows EXE
    runs-on: windows-latest
    if: ${{ github.event.inputs.build_windows == 'true' || github.event.inputs.build_windows == '' }}
    steps:
    - uses: actions/checkout@v4
    - uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
    - run: flutter pub get
    - run: flutter build windows --release
    - uses: actions/upload-artifact@v4
      with:
        name: windows-exe
        path: build/windows/x64/runner/Release/

  build_linux:
    name: Linux AppImage
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.build_linux == 'true' || github.event.inputs.build_linux == '' }}
    steps:
    - uses: actions/checkout@v4
    - uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
    - run: |
        sudo apt-get update
        sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev
    - run: flutter pub get
    - run: flutter build linux --release
    - uses: actions/upload-artifact@v4
      with:
        name: linux-bundle
        path: build/linux/x64/release/bundle/
